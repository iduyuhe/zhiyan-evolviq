name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install deps
        run: pip install -e ".[dev]"
      - name: Tests
        run: ZHIYAN_DEMO_DATA=0 python -m pytest tests/ -q --timeout=60

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: studio
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: studio/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t zhiyan-runtime -f Dockerfile --build-arg PIP_INDEX_URL=https://pypi.org/simple .
      - run: docker build -t zhiyan-studio -f studio/Dockerfile --build-arg NPM_REGISTRY=https://registry.npmjs.org studio/
