name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check src/ --quiet || true
      - name: Run tests
        run: |
          ZHIYAN_DEMO_DATA=0 python -m pytest tests/ -q --timeout=60

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: studio
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: studio/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Type-check
        run: npx tsc --noEmit
      - name: Build
        run: npx vite build

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build runtime image
        run: docker build -t zhiyan-runtime -f Dockerfile --build-arg PIP_INDEX_URL=https://pypi.org/simple .
      - name: Build studio image
        run: docker build -t zhiyan-studio -f studio/Dockerfile --build-arg NPM_REGISTRY=https://registry.npmjs.org studio/
